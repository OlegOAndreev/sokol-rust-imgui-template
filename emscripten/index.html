<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sokol-rust</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      canvas {
        width: 100%;
        height: 100%;
      }
      #status {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #888;
        font-family: monospace;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading...</div>
    <canvas id="canvas"></canvas>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        onRuntimeInitialized: function () {
          var status = document.getElementById("status");
          if (status) status.remove();
        },
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        },
      };
    </script>
    <script src="sokol-rust-imgui-template.js"></script>
  </body>
</html>
