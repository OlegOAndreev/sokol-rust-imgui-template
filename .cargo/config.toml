[profile.dev]
# Never build without optimizations
opt-level = 1
# We do not debug anyway
debug = "line-tables-only"

[profile.release]
# Enable backtrace info
debug = "line-tables-only"
# debug = "none"


[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "target-feature=+simd128",
    "-C", "link-arg=-msimd128",
    "-C", "link-arg=-sSTACK_SIZE=1Mb",
    "-C", "link-arg=-sUSE_WEBGL2",
    "-C", "link-arg=-sEXPORTED_FUNCTIONS=_main,__emscripten_stack_restore"
]
